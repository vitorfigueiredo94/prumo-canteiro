# ── Nginx da VM — serve JurisMonitor + PrumoCanteiro ─────────────────────────
#
# Instalar na VM: sudo cp nginx-vm.conf /etc/nginx/sites-available/saas
#                 sudo ln -s /etc/nginx/sites-available/saas /etc/nginx/sites-enabled/
#                 sudo nginx -t && sudo systemctl reload nginx
#
# JurisMonitor  → porta 8000  → jurismonitorpro.com.br
# PrumoCanteiro → porta 3001  → prumocanteiro.com.br

# ── JurisMonitor ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name jurismonitorpro.com.br www.jurismonitorpro.com.br;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /static/ {
        alias /opt/jurismonitor/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/jurismonitor/media/;
    }
}

# ── PrumoCanteiro ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name prumocanteiro.com.br www.prumocanteiro.com.br;

    client_max_body_size 30M;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache para assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── HTTPS (ativar após: sudo certbot --nginx) ─────────────────────────────────
# O certbot adiciona automaticamente os blocos SSL após:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d jurismonitorpro.com.br -d prumocanteiro.com.br
